<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure System Call</title>
    <!-- Modern high-quality fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="dynamic-bg"></div>
    <div class="dynamic-bg-2"></div>

    <!-- Login Screen -->
    <div id="auth-screen" class="screen active">
        <div class="auth-card glass-panel">
            <div class="shield-icon">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                </svg>
            </div>
            <h1 class="gradient-text">Secure System Call</h1>
            <p class="subtitle">Enter your admin credentials</p>

            <div id="auth-msg" class="msg"></div>

            <div class="input-wrapper">
                <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                    <circle cx="12" cy="7" r="4" />
                </svg>
                <input type="text" id="username" placeholder="Username" />
            </div>

            <div class="input-wrapper">
                <svg class="input-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
                <input type="password" id="password" placeholder="Password" />
            </div>

            <button class="btn-glow" onclick="handleAuth()">Authenticate Session</button>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="main-screen" class="screen">
        <nav class="glass-nav">
            <div class="nav-left">
                <div class="shield-icon-small">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
                    </svg>
                </div>
                <h2>Secure System Call</h2>
                <span id="user-badge" class="badge">ADMIN</span>
            </div>
            <button class="outline-btn" onclick="logout()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Sign Out
            </button>
        </nav>

        <main class="dashboard-grid">

            <!-- Context Control Panel -->
            <section class="glass-panel control-section">
                <div class="section-header">
                    <h3>Execution Context</h3>
                    <p>Perform validated I/O operations.</p>
                </div>

                <div class="form-group">
                    <label for="filename">Target File</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2">
                            <path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z" />
                            <polyline points="13 2 13 9 20 9" />
                        </svg>
                        <input type="text" id="filename" placeholder="e.g. data.txt" />
                    </div>
                </div>

                <div class="form-group">
                    <label for="file-content">Injection Buffer</label>
                    <div class="input-wrapper textarea-wrapper">
                        <textarea id="file-content" rows="5" placeholder="Content to be securely written..."></textarea>
                    </div>
                </div>

                <div class="action-buttons">
                    <button class="sys-btn read-btn" onclick="syscall('read')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                            <circle cx="12" cy="12" r="3" />
                        </svg>
                        Read
                    </button>
                    <button class="sys-btn write-btn" onclick="syscall('write')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M12 20h9" />
                            <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" />
                        </svg>
                        Write
                    </button>
                    <button class="sys-btn delete-btn" onclick="syscall('delete')">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <polyline points="3 6 5 6 21 6" />
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                            <line x1="10" y1="11" x2="10" y2="17" />
                            <line x1="14" y1="11" x2="14" y2="17" />
                        </svg>
                        Delete
                    </button>
                </div>

                <div id="status-msg" class="msg"></div>
            </section>

            <!-- Audit Stream Terminal -->
            <section class="glass-panel log-section">
                <div class="section-header flex-between">
                    <div>
                        <h3>Audit Stream</h3>
                        <p>Live tracking of all system calls.</p>
                    </div>
                    <button class="refresh-btn" onclick="fetchLogs()" title="Refresh Logs">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2">
                            <path d="M21 2v6h-6" />
                            <path d="M3 12a9 9 0 1 0 2.13-5.88L2.09 9" />
                            <path d="M3 2v6h6" />
                            <path d="M21 12a9 9 0 1 0-2.13 5.88L21.91 15" />
                        </svg>
                    </button>
                </div>

                <div class="mac-terminal">
                    <div class="mac-header">
                        <div class="mac-buttons">
                            <span class="close-btn"></span>
                            <span class="min-btn"></span>
                            <span class="max-btn"></span>
                        </div>
                        <div class="mac-title">/var/log/system_calls.log</div>
                    </div>
                    <div class="mac-body">
                        <pre id="log-output">Loading secure audit trail...</pre>
                    </div>
                </div>
            </section>

        </main>
    </div>

    <script src="app.js"></script>
</body>

</html>
